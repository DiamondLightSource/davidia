packages:
 - 'client/**'
 - 'storybook'
peerDependencyRules:
  allowedVersions:
    react-aria-menubutton>react: "18.x"
allowBuilds:
  "@tree-sitter-grammars/tree-sitter-yaml": true
  bufferutil: true
  core-js-pure: true
  es5-ext: true
  esbuild: true
  tree-sitter: true
  tree-sitter-json: true
  utf-8-validate: true
  "@scarf/scarf": false
overrides:
  static-module: "^3.0.4"
  static-eval: "^2.1.1"
  minimist: "^0.2.4"
